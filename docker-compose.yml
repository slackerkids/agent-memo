services:
  memory:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - memdata:/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/memory-service", "-health-check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  memdata: